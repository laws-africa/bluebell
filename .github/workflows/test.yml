# Runs the same poe tasks defined in pyproject.toml that developers run
# locally (`poe test` = test-py + test-rust + test-wasm), so CI and local
# verification cannot drift apart.

name: Test

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        pip install 'git+https://git@github.com/laws-africa/cobalt.git@master#egg=cobalt'
        pip install -e '.[dev]'
    - name: Lint
      run: poe lint
    - name: Run tests
      run: poe test-py

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # the Rust parity tests shell out to `python` and import bluebell
    - name: Install dependencies
      run: |
        pip install 'git+https://git@github.com/laws-africa/cobalt.git@master#egg=cobalt'
        pip install -e '.[dev]'

    # xsltproc: unparses XML roundtrip fixtures in the parity tests
    # libxml2-dev: needed by the `libxml` crate in the schema validation tests
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y xsltproc libxml2-dev pkg-config

    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2

    - name: Run Rust tests
      run: poe test-rust

    # build and install the pyo3 extension, then re-run the Python suite so
    # the Rust-backed parse path is exercised (the `build` job covers the
    # pure-Python fallback path)
    - name: Install the Rust Python extension
      run: pip install ./crates/bluebell-python

    - name: Run Python tests against the Rust extension
      run: |
        python -c "import _bluebell_rs"
        poe test-py

  wasm:
    name: WASM tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install 'git+https://git@github.com/laws-africa/cobalt.git@master#egg=cobalt'
        pip install -e '.[dev]'

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Run wasm tests
      run: poe test-wasm
