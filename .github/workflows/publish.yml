name: Publish to PyPI

on:
  release:
    types: [created]

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bluebell-akn
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install 'git+https://git@github.com/laws-africa/cobalt.git@master#egg=cobalt'
        pip install -e '.[dev]'

    - name: Build distribution
      run: python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  rust-wheels:
    name: Build bluebell-akn-rs wheel (${{ matrix.platform.runner }}, ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
          - runner: macos-latest
            target: universal2-apple-darwin
          - runner: windows-latest
            target: x64
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # abi3 wheels: one wheel per platform covers CPython 3.12+
    - name: Build wheel
      uses: PyO3/maturin-action@v1
      with:
        working-directory: crates/bluebell-python
        target: ${{ matrix.platform.target }}
        args: --release --out dist
        manylinux: auto

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
        path: crates/bluebell-python/dist

  rust-sdist:
    name: Build bluebell-akn-rs sdist
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        working-directory: crates/bluebell-python
        command: sdist
        args: --out dist

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-sdist
        path: crates/bluebell-python/dist

  rust-pypi-publish:
    name: Upload bluebell-akn-rs to PyPI
    needs: [rust-wheels, rust-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi-rs
      url: https://pypi.org/p/bluebell-akn-rs
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist

  npm-publish:
    name: Publish @lawsafrica/bluebell-wasm to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm --provenance
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        registry-url: https://registry.npmjs.org

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install 'git+https://git@github.com/laws-africa/cobalt.git@master#egg=cobalt'
        pip install -e '.[dev]'

    - name: Install wasm32 target
      run: rustup target add wasm32-unknown-unknown

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    # test-wasm and build-wasm are the same poe tasks developers run locally;
    # build-wasm owns the wasm-pack flags (target, npm scope) in pyproject.toml
    - name: Run wasm tests
      run: poe test-wasm

    - name: Build npm package
      run: poe build-wasm

    - name: Publish to npm
      working-directory: crates/bluebell-wasm
      run: npm publish pkg/ --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
